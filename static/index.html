<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智能选股</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260620-dashboard1" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-mini">
          <strong>智能选股</strong>
          <span>AI Quant Stock Selector</span>
        </div>
        <div class="toolbar">
          <label>
            目标日
            <input id="dateInput" type="date" />
          </label>
          <button id="refreshBtn" type="button">刷新</button>
          <button id="forceBtn" type="button">强制重算</button>
        </div>
      </header>

      <main>
        <section class="hero-panel">
          <div class="hero-copy">
            <span class="hero-kicker">AI + UZI + CZSC + Serenity</span>
            <h1>智能选股</h1>
            <p id="subtitle">正在读取本次决策时间和观察窗口</p>
          </div>
          <div class="hero-badges">
            <span>未来2周</span>
            <span>实时价</span>
            <span>风控优先</span>
          </div>
        </section>

        <section class="market-decision-panel">
          <div class="section-title">
            <div>
              <span class="label">市场选择</span>
              <h2>今天是否值得买</h2>
            </div>
            <span class="muted">目标是在指定价格买入后，未来2周获得正收益</span>
          </div>
          <div id="marketTabs" class="market-tabs market-decision-cards">
            <div class="market-card placeholder"><strong>A股</strong><span>读取中</span></div>
            <div class="market-card placeholder"><strong>港股</strong><span>读取中</span></div>
            <div class="market-card placeholder"><strong>美股</strong><span>读取中</span></div>
          </div>
        </section>

        <section class="stock-brief-panel" id="decisionPanel">
          <div class="panel-head">
            <span class="label">单股说明</span>
            <span id="signalDate" class="muted"></span>
          </div>
          <div class="stock-brief-grid">
            <article class="decision-panel">
              <div class="panel-head compact-head">
                <span class="label">操作建议</span>
                <span class="status" id="actionBadge">加载中</span>
              </div>
              <div id="primaryBlock" class="primary-block">
                <div class="skeleton line"></div>
                <div class="skeleton title"></div>
                <div class="skeleton row"></div>
              </div>
            </article>

            <article class="reason-panel">
              <div class="reason-columns">
                <div class="reason-box reason-positive">
                  <h2>推荐理由</h2>
                  <ul id="reasons" class="reason-list">
                    <li>正在读取推荐理由</li>
                  </ul>
                </div>
                <div class="reason-box reason-risk">
                  <h2>风险说明</h2>
                  <ul id="riskList" class="reason-list risk-list">
                    <li>正在读取风险标签</li>
                  </ul>
                </div>
              </div>
              <div id="factorStrip" class="factor-strip"></div>
            </article>
          </div>
        </section>

        <section class="history-panel">
          <div class="section-title">
            <div>
              <span class="label">历史推荐记录</span>
              <h2>按推荐时间追溯每次快照</h2>
            </div>
            <span id="historyStatus" class="muted">读取缓存中</span>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>

        <section class="table-panel">
          <div class="section-title">
            <div>
              <span class="label">候选排序</span>
              <h2>当日 Top5</h2>
            </div>
            <div id="candidateTabs" class="candidate-tabs"></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>排名</th>
                  <th>股票</th>
                  <th>推荐度</th>
                  <th>建议价格</th>
                  <th>预估收益</th>
                  <th>推荐理由</th>
                  <th>风险摘要</th>
                </tr>
              </thead>
              <tbody id="candidateRows"></tbody>
            </table>
          </div>
        </section>

        <section class="market-context-grid">
          <article class="side-panel">
            <div class="panel-head">
              <span class="label">市场环境</span>
            </div>
            <div id="marketBlock" class="market-block"></div>
          </article>
          <article class="side-panel">
            <div class="panel-head">
              <span class="label">行业热度</span>
            </div>
            <div id="industryBlock" class="industry-block"></div>
          </article>
        </section>
      </main>
    </div>
    <script src="/static/app.js?v=20260620-dashboard1"></script>
  </body>
</html>
