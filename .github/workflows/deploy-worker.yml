name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  schedule:
    # Beijing trading-day checkpoints:
    # 08:58, 09:58, 10:58, 12:58, 13:58, 14:58, 21:28, 23:58
    - cron: "58 0,1,2,4,5,6,15 * * 1-5"
    # Beijing 21:28
    - cron: "28 13 * * 1-5"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check scheduled time slot
        id: schedule_gate
        if: github.event_name == 'schedule'
        run: python scripts/schedule_gate.py

      - name: Install Serenity skill
        if: github.event_name != 'push' && (github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true')
        run: python scripts/install_serenity_skill.py

      - name: Generate smart pick snapshot
        if: github.event_name != 'push' && (github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true')
        run: python server.py --once --force

      - name: Install Node dependencies
        run: npm ci

      - name: Build Worker assets
        run: npm run build

      - name: Commit generated snapshot
        if: github.event_name != 'push' && (github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily pick snapshot"
          file_pattern: data/picks/*.json

      - name: Deploy Worker
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
